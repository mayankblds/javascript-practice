<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guess number</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;    
            background-color: #000000;
            height: 100vh;
        }
        
        #gameContainer {
            width: min(400px, 90vw);
            background-color: #212121;
            color: #dedcdc;
            border-radius: 10px;
            padding: 20px; 
            border: 2px solid #ffffff;
            display: flex;
            flex-direction: column;  
            justify-content: center;
            align-items: center;
            transform: scale(0.85);
        }
        
        #resultMessage {
            display: none;

            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;

            background-color: rgba(52, 51, 51, 0.8);
        }
        #popup {
            background-color: #313131;
            padding: 20px;
            border-radius: 10px;
            color: #7dff88;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid rgba(252, 253, 253, 0.8);
            box-shadow: 0 0 15px #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #newgame {
            display: none;
            margin-top: 20px;
        }
        #attemptsMessage {
            color: #f26565;
        }
        input{
            padding: 8px;
            margin: 10px;
            font-size: 18px;
            text-align: center;
            border-radius: 5px;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            
        }
        button {margin: 10px;
            cursor: pointer;
            background-color: #30d0f0;
            padding: 5px 10px;
            border-radius: 50%;
            height: 70px;
            width: 70px;
            border: none;
            box-shadow:
             0 0 15px #30d0f0;
            font-weight: bold;
        }

        .preguess {
            border: 1px solid #dedcdc;
            text-align: center;
            border-radius: 5px;
            background-color: #313131;
            width: 300px;
            height: 120px;
            margin: 10px auto;
        }
        #guessList {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding-right: 15px;
        }
    </style>
</head>
<body>
    
<div id="gameContainer">
    <h1>Guess the Number</h1>
    <h3>Guess a number between 1 and 100:</h3>
    <h3 id="attemptsMessage">remaining attempts: <span id="attempts">10</span> </h3>
    <input type="text" inputmode="numeric" id="guessInput"><br>
    <button id="submit">CHECK</button>

    <section class="preguess">
        <p>Previous guesses:</p>
        <ul id="guessList"></ul>
    </section>

    <div id="resultMessage">
        <div id="popup">
            <span  id="popupText">sample text</span>
            <button id="newgame">New Game</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
